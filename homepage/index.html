<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUJF.AI · Record Us Just Forever</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* 背景图 */
    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* 轻微遮罩（不再压暗太多） */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.25);
      z-index: 1;
    }

    /* 右侧内容区域 */
    .panel {
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      color: white;
      text-align: right;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 13px;
      color: #bbb;
      margin-bottom: 30px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }

    .card {
      padding: 10px 16px;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: 0.2s;
      min-width: 160px;
      text-align: center;
    }

    .card:hover {
      background: rgba(255,255,255,0.18);
    }

    a {
      text-decoration: none;
      color: white;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      right: 40px;
      font-size: 12px;
      color: #aaa;
      z-index: 2;
    }

  </style>
</head>

<body>

  <!-- 背景 -->
  <img class="bg" src="./assets/hero.png" alt="RUJF" />

  <!-- 遮罩 -->
  <div class="overlay"></div>

  <!-- 右侧面板 -->
  <div class="panel">
    <h1>RUJF.AI</h1>
    <div class="subtitle">Record Us Just Forever</div>

    <div class="menu">
      <a href="diary.html">
        <div class="card">📖 回响簿</div>
      </a>

      <div class="card">🧠 思考与体系（未开放）</div>
      <div class="card">🌱 项目与创造（未开放）</div>
    </div>
  </div>

  <div class="footer">
    Allen & 澈
  </div>

</body>
</html>
