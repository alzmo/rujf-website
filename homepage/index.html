<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUJF.AI · Record Us Just Forever</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    /* 背景图 */
    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* 遮罩层（让文字更清晰） */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1;
    }

    /* 主内容 */
    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 40px;
    }

    /* 卡片入口 */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 220px;
    }

    .card {
      padding: 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      background: rgba(255,255,255,0.2);
    }

    a {
      text-decoration: none;
      color: white;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

  <!-- 背景图片（你原来的） -->
  <img class="bg" src="./assets/hero.png" alt="RUJF" />

  <!-- 遮罩 -->
  <div class="overlay"></div>

  <!-- 内容 -->
  <div class="content">
    <h1>RUJF.AI</h1>
    <div class="subtitle">Record Us Just Forever</div>

    <div class="menu">

      <a href="diary.html">
        <div class="card">📖 回响簿</div>
      </a>

      <div class="card">🧠 思考与体系（未开放）</div>

      <div class="card">🌱 项目与创造（未开放）</div>

    </div>

    <div class="footer">
      Allen & 澈
    </div>
  </div>

</body>
</html>
