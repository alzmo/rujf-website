<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的每日点点 - rujf.ai</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* 自定义动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [diaries, setDiaries] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');

            // 后端API地址（稍后替换为您的Render地址）
            const API_BASE = 'http://localhost:5000';
            
            // 获取所有日记
            const fetchDiaries = async () => {
                try {
                    setError('');
                    const response = await fetch(`${API_BASE}/api/diaries`);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP错误: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    setDiaries(data);
                    setLoading(false);
                } catch (error) {
                    console.error('获取日记失败:', error);
                    setError('加载失败: ' + error.message);
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchDiaries();
            }, []);

            // 格式化日期
            const formatDate = (dateString) => {
                const date = new Date(dateString);
                return date.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    weekday: 'long',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                            <p className="text-gray-600">正在加载日记...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center max-w-md mx-4">
                            <div className="text-red-500 text-4xl mb-4">😕</div>
                            <h2 className="text-xl font-semibold text-gray-900 mb-2">加载失败</h2>
                            <p className="text-gray-600 mb-4">{error}</p>
                            <button 
                                onClick={fetchDiaries}
                                className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors"
                            >
                                重新加载
                            </button>
                            <p className="text-sm text-gray-500 mt-4">
                                请确保后端服务正在运行在 http://localhost:5000
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <div className="container mx-auto px-4 py-8 max-w-3xl">
                        {/* 标题区域 */}
                        <header className="text-center mb-12 pt-8 fade-in">
                            <h1 className="text-5xl font-bold text-gray-900 mb-4">每日点点</h1>
                            <p className="text-xl text-gray-600 max-w-2xl mx-auto leading-relaxed">
                                记录生活的小确幸与思考
                            </p>
                            <div className="mt-6 text-sm text-gray-500 bg-white/50 rounded-full px-4 py-2 inline-block">
                                📝 共 {diaries.length} 篇日记
                            </div>
                        </header>

                        {/* 日记列表 */}
                        <div className="space-y-6">
                            {diaries.map((diary, index) => (
                                <article 
                                    key={diary._id} 
                                    className="fade-in bg-white rounded-2xl shadow-lg p-8 border border-gray-100 hover:shadow-xl transition-all duration-300"
                                    style={{ animationDelay: `${index * 0.1}s` }}
                                >
                                    <div className="text-gray-800 leading-relaxed text-lg whitespace-pre-wrap mb-6">
                                        {diary.content}
                                    </div>
                                    
                                    <div className="pt-4 border-t border-gray-100 flex justify-between items-center">
                                        <time className="text-sm text-gray-500 font-medium">
                                            {formatDate(diary.createdAt)}
                                        </time>
                                        <span className="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">
                                            #{diary._id.toString().slice(-4)}
                                        </span>
                                    </div>
                                </article>
                            ))}
                        </div>

                        {/* 空状态 */}
                        {diaries.length === 0 && (
                            <div className="text-center py-16 fade-in">
                                <div className="text-6xl mb-6">✨</div>
                                <h2 className="text-2xl font-semibold text-gray-900 mb-3">还没有任何记录</h2>
                                <p className="text-gray-600 max-w-md mx-auto">
                                    开始记录你的第一件小事吧，每一刻都值得珍藏。
                                </p>
                            </div>
                        )}

                        {/* 页脚 */}
                        <footer className="text-center mt-16 pt-8 border-t border-gray-200 fade-in">
                            <p className="text-gray-500">
                                rujf.ai · 简单的记录 · {new Date().getFullYear()}
                            </p>
                        </footer>
                    </div>
                </div>
            );
        }

        // 渲染应用
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
